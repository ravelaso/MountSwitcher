name: Build and Release MountSwitcher

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.5.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - toc_file: MountSwitcher.toc
            output_name: MountSwitcher-WOTLK
            interface: "30300"
          - toc_file: MountSwitcher_Classic.toc
            output_name: MountSwitcher-Classic
            interface: "40400"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Prepare addon directory for ${{ matrix.output_name }}
        run: |
          # Create temp directory
          mkdir -p "build/${{ matrix.output_name }}"
          
          # Copy all files except .git, .github, and other non-addon files
          # Read the .toc file to know which files to include
          TOC_FILE="${{ matrix.toc_file }}"
          
          # Copy the correct .toc and rename it to MountSwitcher.toc for WoW to load
          cp "$TOC_FILE" "build/${{ matrix.output_name }}/MountSwitcher.toc"
          
          # Parse .toc file and copy all referenced files
          # Note: .toc files use Windows backslashes, need to convert to forward slashes for Linux
          while IFS= read -r line || [[ -n "$line" ]]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            # Skip Interface, Title, Notes, etc. (metadata lines)
            [[ "$line" =~ ^##.*$ ]] && continue
            
            # Convert Windows backslashes to forward slashes for Linux compatibility
            # Also handle both \ and / path separators that might be in the toc
            line_normalized="${line//\\//}"
            
            # Copy the file
            if [ -f "$line_normalized" ]; then
              # Create directory structure if needed
              dir=$(dirname "$line_normalized")
              mkdir -p "build/${{ matrix.output_name }}/$dir"
              cp "$line_normalized" "build/${{ matrix.output_name }}/$line_normalized"
              echo "Copied: $line_normalized"
            else
              echo "Warning: File not found: $line_normalized (original: $line)"
            fi
          done < "$TOC_FILE"
          
          # Also copy Bindings.xml if referenced
          if grep -q "Bindings.xml" "$TOC_FILE"; then
            cp Bindings.xml "build/${{ matrix.output_name }}/Bindings.xml"
          fi
          
          # Copy MountSwitcher.xml if referenced
          if grep -q "MountSwitcher.xml" "$TOC_FILE"; then
            cp MountSwitcher.xml "build/${{ matrix.output_name }}/MountSwitcher.xml"
          fi
          
          # Copy MountSwitcher.lua (the stub loader)
          cp MountSwitcher.lua "build/${{ matrix.output_name }}/MountSwitcher.lua"
          
          echo "Contents of build directory:"
          find "build/${{ matrix.output_name }}" -type f | sort
      
      - name: Create ZIP for ${{ matrix.output_name }}
        run: |
          # Create zip from inside the addon folder so files are at root level
          # Using -j flag to junk (don't store) paths - flatten the structure
          cd "build/${{ matrix.output_name }}"
          zip -r -j "../../${{ matrix.output_name }}.zip" .
          cd ../..
          
          echo "=== ZIP contents ==="
          unzip -l "${{ matrix.output_name }}.zip"
       
      - name: Upload artifact ${{ matrix.output_name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: ${{ matrix.output_name }}.zip
  
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
       
      - name: List downloaded files
        run: |
          echo "=== Files in artifacts directory ==="
          find artifacts -type f -name "*.zip"
          echo "=== Directory structure ==="
          ls -la artifacts/
       
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
