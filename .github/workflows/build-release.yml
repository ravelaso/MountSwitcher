name: Build and Release MountSwitcher

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.5.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - toc_file: MountSwitcher_WOTLK.toc
            folder_name: MountSwitcher_WOTLK
            interface: "30300"
          - toc_file: MountSwitcher_Classic.toc
            folder_name: MountSwitcher_Classic
            interface: "40400"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Prepare addon directory for ${{ matrix.folder_name }}
        run: |
          # Create temp directory with the correct folder name for WoW
          mkdir -p "build/${{ matrix.folder_name }}"
          
          # Copy all files except .git, .github, and other non-addon files
          # Read the .toc file to know which files to include
          TOC_FILE="${{ matrix.toc_file }}"
          
          # Copy the .toc with its correct name (WoW needs toc filename = folder name)
          cp "$TOC_FILE" "build/${{ matrix.folder_name }}/$TOC_FILE"
          
          # Parse .toc file and copy all referenced files
          # Note: .toc files use Windows backslashes, need to convert to forward slashes for Linux
          while IFS= read -r line || [[ -n "$line" ]]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            # Skip Interface, Title, Notes, etc. (metadata lines)
            [[ "$line" =~ ^##.*$ ]] && continue
            
            # Convert Windows backslashes to forward slashes for Linux compatibility
            # Also handle both \ and / path separators that might be in the toc
            line_normalized="${line//\\//}"
            
            # Copy the file
            if [ -f "$line_normalized" ]; then
              # Create directory structure if needed
              dir=$(dirname "$line_normalized")
              mkdir -p "build/${{ matrix.folder_name }}/$dir"
              cp "$line_normalized" "build/${{ matrix.folder_name }}/$line_normalized"
              echo "Copied: $line_normalized"
            else
              echo "Warning: File not found: $line_normalized (original: $line)"
            fi
          done < "$TOC_FILE"
          
          # Also copy Bindings.xml if referenced
          if grep -q "Bindings.xml" "$TOC_FILE"; then
            cp Bindings.xml "build/${{ matrix.folder_name }}/Bindings.xml"
          fi
          
          # Copy MountSwitcher.xml if referenced
          if grep -q "MountSwitcher.xml" "$TOC_FILE"; then
            cp MountSwitcher.xml "build/${{ matrix.folder_name }}/MountSwitcher.xml"
          fi
          
          echo "Contents of build directory:"
          find "build/${{ matrix.folder_name }}" -type f | sort
      
      - name: Create ZIP for ${{ matrix.folder_name }}
        run: |
          # Create zip from the build folder to preserve lib/ structure
          # The folder name inside must match the addon name for WoW
          # Zip name matches folder name for consistency
          cd build
          zip -r "${{ matrix.folder_name }}.zip" "${{ matrix.folder_name }}"
          mv "${{ matrix.folder_name }}.zip" ..
          cd ..
          
          echo "=== ZIP contents ==="
          unzip -l "${{ matrix.folder_name }}.zip"
        
      - name: Upload artifact ${{ matrix.folder_name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.folder_name }}
          path: ${{ matrix.folder_name }}.zip
  
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
       
      - name: List downloaded files
        run: |
          echo "=== Files in artifacts directory ==="
          find artifacts -type f -name "*.zip"
          echo "=== Directory structure ==="
          ls -la artifacts/
       
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
